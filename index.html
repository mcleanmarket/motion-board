<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MOTION // BOARD</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #050505;
      --surface:  #0b0b0b;
      --line:     #161616;
      --line-hi:  #222;
      --text:     #ededed;
      --dim:      #3a3a3a;
      --muted:    #555;
      --gold:     #c9a84c;
      --silver:   #8a8a8a;
      --bronze:   #7a4a2a;
      --green:    #3ddc84;
    }

    html { font-size: 16px; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      /* Subtle grain texture */
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
      background-size: 200px 200px;
    }

    /* Darken the grain so it's just a texture hint */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: var(--bg);
      opacity: 0.88;
      pointer-events: none;
      z-index: 0;
    }

    .wrap {
      position: relative;
      z-index: 1;
      max-width: 760px;
      margin: 0 auto;
      padding: 56px 28px 100px;
    }

    /* ─── HEADER ─────────────────────────────────── */
    .hdr {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 60px;
    }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 42px;
      letter-spacing: 0.06em;
      line-height: 1;
      color: var(--text);
    }
    .logo .slash {
      color: var(--dim);
      margin: 0 6px;
    }
    .logo .sub {
      font-size: 16px;
      color: var(--muted);
      letter-spacing: 0.18em;
    }

    .hdr-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 8px;
      padding-top: 4px;
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--dim);
      flex-shrink: 0;
    }
    .dot.live {
      background: var(--green);
      box-shadow: 0 0 10px var(--green);
      animation: blink 2.4s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    .refresh-btn {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--dim);
      background: none;
      border: 1px solid var(--line-hi);
      cursor: pointer;
      padding: 5px 10px;
      border-radius: 3px;
      transition: all 0.15s;
    }
    .refresh-btn:hover { color: var(--muted); border-color: var(--muted); }

    /* ─── CONTROLS ───────────────────────────────── */
    .controls {
      margin-bottom: 48px;
    }

    .metric-wrap {
      display: flex;
      gap: 0;
      margin-bottom: 20px;
      border: 1px solid var(--line-hi);
      border-radius: 4px;
      width: fit-content;
      overflow: hidden;
    }

    .metric-btn {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px;
      letter-spacing: 0.12em;
      color: var(--muted);
      background: none;
      border: none;
      border-right: 1px solid var(--line-hi);
      cursor: pointer;
      padding: 9px 28px 6px;
      transition: all 0.15s;
    }
    .metric-btn:last-child { border-right: none; }
    .metric-btn:hover { color: var(--silver); }
    .metric-btn.on {
      background: var(--text);
      color: var(--bg);
    }

    .period-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .period-btn {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      background: none;
      border: 1px solid var(--line);
      cursor: pointer;
      padding: 7px 14px;
      border-radius: 100px;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .period-btn:hover { border-color: var(--line-hi); color: var(--silver); }
    .period-btn.on { border-color: rgba(237,237,237,0.35); color: var(--text); }

    /* ─── BOARD ──────────────────────────────────── */
    .section-label {
      font-size: 9px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--dim);
      margin-bottom: 12px;
    }

    .board { display: flex; flex-direction: column; }

    /* hairline divider */
    .divider {
      height: 1px;
      background: var(--line);
    }

    .row {
      display: grid;
      grid-template-columns: 52px 1fr 72px;
      align-items: center;
      gap: 16px;
      padding: 20px 0;
      position: relative;
      overflow: hidden;
      animation: slideIn 0.3s ease both;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-10px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    /* background heat bar */
    .row::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: var(--pct, 0%);
      background: linear-gradient(90deg, rgba(255,255,255,0.035) 0%, transparent 100%);
      transition: width 0.8s cubic-bezier(0.4,0,0.2,1);
      pointer-events: none;
    }

    .row-rank {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 32px;
      letter-spacing: 0.04em;
      color: var(--dim);
      text-align: center;
      line-height: 1;
      position: relative;
      z-index: 1;
      transition: color 0.2s;
    }
    .row.r1 .row-rank { color: var(--gold); }
    .row.r2 .row-rank { color: var(--silver); }
    .row.r3 .row-rank { color: var(--bronze); }

    .row-info {
      position: relative;
      z-index: 1;
    }
    .row-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 0.1em;
      color: var(--text);
      line-height: 1;
    }

    .row-count {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 42px;
      letter-spacing: -0.01em;
      color: var(--muted);
      text-align: right;
      line-height: 1;
      position: relative;
      z-index: 1;
      font-variant-numeric: tabular-nums;
    }
    .row.r1 .row-count { color: var(--gold); }
    .row.r2 .row-count { color: var(--silver); }
    .row.r3 .row-count { color: var(--bronze); }

    /* Accent line on left for top 3 */
    .row.r1::after,
    .row.r2::after,
    .row.r3::after {
      content: '';
      position: absolute;
      left: 0; top: 25%; bottom: 25%;
      width: 2px;
      border-radius: 1px;
    }
    .row.r1::after { background: var(--gold); }
    .row.r2::after { background: var(--silver); }
    .row.r3::after { background: var(--bronze); }

    /* ─── STATE MESSAGES ─────────────────────────── */
    .msg {
      padding: 80px 0;
      text-align: center;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--dim);
    }

    /* ─── FOOTER ─────────────────────────────────── */
    .footer {
      margin-top: 60px;
      font-size: 9px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--dim);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    @media (max-width: 520px) {
      .logo { font-size: 32px; }
      .hdr  { flex-direction: column; gap: 16px; }
      .hdr-right { align-items: flex-start; }
      .row-count { font-size: 32px; }
      .wrap { padding: 36px 20px 80px; }
    }
  </style>
</head>
<body>
<div class="wrap">

  <!-- HEADER -->
  <div class="hdr">
    <div class="logo">
      MOTION<span class="slash">//</span>BOARD
      <div class="sub">Sales Leaderboard</div>
    </div>
    <div class="hdr-right">
      <div class="status-row">
        <div class="dot" id="dot"></div>
        <span id="statusTxt">—</span>
      </div>
      <button class="refresh-btn" onclick="load(true)">↻ Refresh</button>
    </div>
  </div>

  <!-- CONTROLS -->
  <div class="controls">
    <div class="metric-wrap">
      <button class="metric-btn on" onclick="setMetric('sales',this)">Sales</button>
      <button class="metric-btn"    onclick="setMetric('installs',this)">Installs</button>
    </div>
    <div class="period-wrap">
      <button class="period-btn"    onclick="setPeriod('today',this)">Today</button>
      <button class="period-btn"    onclick="setPeriod('yesterday',this)">Yesterday</button>
      <button class="period-btn on" onclick="setPeriod('this-week',this)">This Week</button>
      <button class="period-btn"    onclick="setPeriod('last-week',this)">Last Week</button>
      <button class="period-btn"    onclick="setPeriod('this-month',this)">This Month</button>
      <button class="period-btn"    onclick="setPeriod('last-month',this)">Last Month</button>
      <button class="period-btn"    onclick="setPeriod('this-year',this)">This Year</button>
    </div>
  </div>

  <!-- BOARD -->
  <div class="section-label" id="boardLabel">— Rankings</div>
  <div class="board" id="board">
    <div class="divider"></div>
    <div class="msg">Loading...</div>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    <span>McLean Marketing LLC</span>
    <span id="footerTime"></span>
  </div>

</div>

<script>
// ── CONFIG ────────────────────────────────────────────────────
const GAS_URL  = 'https://script.google.com/macros/s/AKfycbwNxbZpAMujaCCV1ppqGKE-1azpK-vXembm9w_VOH5cvpoIG_yisVTjYTK7V6Um9GJFNg/exec';
const CACHE_MS = 60 * 60 * 1000; // 1 hour cache
// ─────────────────────────────────────────────────────────────

let rawData = null;
let metric  = 'sales';
let period  = 'this-week';

// ── DATE UTILITIES ────────────────────────────────────────────
function sub(d, n) { const x = new Date(d); x.setDate(x.getDate() - n); return x; }
function add(d, n) { const x = new Date(d); x.setDate(x.getDate() + n); return x; }

function dateRange(p) {
  const now = new Date();
  const t   = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  let s, e;
  switch (p) {
    case 'today':      s = e = t;           break;
    case 'yesterday':  s = e = sub(t, 1);   break;
    case 'this-week': {
      const wd = t.getDay();
      s = sub(t, wd === 0 ? 6 : wd - 1);
      e = add(s, 6);
      break;
    }
    case 'last-week': {
      const wd = t.getDay();
      const mon = sub(t, wd === 0 ? 6 : wd - 1);
      s = sub(mon, 7); e = sub(mon, 1);
      break;
    }
    case 'this-month':
      s = new Date(t.getFullYear(), t.getMonth(), 1);
      e = new Date(t.getFullYear(), t.getMonth() + 1, 0);
      break;
    case 'last-month':
      s = new Date(t.getFullYear(), t.getMonth() - 1, 1);
      e = new Date(t.getFullYear(), t.getMonth(), 0);
      break;
    case 'this-year':
      s = new Date(t.getFullYear(), 0, 1);
      e = new Date(t.getFullYear(), 11, 31);
      break;
  }
  return [s, e];
}

function inRange(str, s, e) {
  if (!str) return false;
  const d = new Date(str);
  if (isNaN(d)) return false;
  const day = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  return day >= s && day <= e;
}

// ── COMPUTE ───────────────────────────────────────────────────
function compute() {
  if (!rawData) return [];
  const [s, e] = dateRange(period);
  return Object.entries(rawData.reps)
    .map(([rep, rows]) => ({
      rep,
      count: metric === 'sales'
        ? rows.filter(r => inRange(r.sold, s, e)).length
        : rows.filter(r => r.accStatus.toLowerCase() === 'active' && inRange(r.install, s, e)).length
    }))
    .filter(r => r.count > 0)
    .sort((a, b) => b.count - a.count);
}

// ── RENDER ────────────────────────────────────────────────────
const PERIOD_LABELS = {
  'today':      'Today',
  'yesterday':  'Yesterday',
  'this-week':  'This Week',
  'last-week':  'Last Week',
  'this-month': 'This Month',
  'last-month': 'Last Month',
  'this-year':  'This Year'
};

function render() {
  const board = document.getElementById('board');
  const label = document.getElementById('boardLabel');

  if (!rawData) {
    board.innerHTML = '<div class="divider"></div><div class="msg">Loading...</div>';
    return;
  }

  const rows = compute();
  const metricLabel = metric === 'sales' ? 'Sales' : 'Installs';
  label.textContent = `— ${PERIOD_LABELS[period]} · ${metricLabel}`;

  if (!rows.length) {
    board.innerHTML = '<div class="divider"></div><div class="msg">No data for this period</div>';
    return;
  }

  const max = rows[0].count;
  board.innerHTML = rows.map((r, i) => {
    const rank   = i + 1;
    const cls    = rank <= 3 ? ` r${rank}` : '';
    const pct    = Math.round((r.count / max) * 100);
    const delay  = i * 50;
    const rankTxt = String(rank).padStart(2, '0');
    return `
      <div class="divider"></div>
      <div class="row${cls}" style="--pct:${pct}%;animation-delay:${delay}ms">
        <div class="row-rank">${rankTxt}</div>
        <div class="row-info">
          <div class="row-name">${r.rep}</div>
        </div>
        <div class="row-count">${r.count}</div>
      </div>`;
  }).join('') + '<div class="divider"></div>';
}

// ── LOAD ──────────────────────────────────────────────────────
async function load(force = false) {
  const dot = document.getElementById('dot');
  const txt = document.getElementById('statusTxt');
  dot.className = 'dot';
  txt.textContent = 'Loading...';

  if (!force) {
    try {
      const c = JSON.parse(localStorage.getItem('mb_v2') || 'null');
      if (c && Date.now() - c.ts < CACHE_MS) {
        rawData = c.d;
        dot.className = 'dot live';
        txt.textContent = ago(c.ts);
        setFooterTime(c.ts);
        render();
        return;
      }
    } catch (_) {}
  }

  render(); // show loading state

  try {
    const res  = await fetch(GAS_URL + '?cb=' + Date.now());
    const json = await res.json();
    if (!json.ok) throw new Error(json.error || 'Script error');
    rawData = json;
    const ts = Date.now();
    localStorage.setItem('mb_v2', JSON.stringify({ d: json, ts }));
    dot.className = 'dot live';
    txt.textContent = 'Live';
    setFooterTime(ts);
    render();
  } catch (err) {
    dot.className = 'dot';
    txt.textContent = 'Error';
    document.getElementById('board').innerHTML =
      '<div class="divider"></div><div class="msg">Could not load — check GAS URL</div>';
    console.error(err);
  }
}

function ago(ts) {
  const m = Math.floor((Date.now() - ts) / 60000);
  if (m < 1)  return 'Just updated';
  if (m < 60) return m + 'm ago';
  return Math.floor(m / 60) + 'h ago';
}

function setFooterTime(ts) {
  document.getElementById('footerTime').textContent =
    'Updated ' + new Date(ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

// ── CONTROLS ─────────────────────────────────────────────────
function setMetric(m, el) {
  metric = m;
  document.querySelectorAll('.metric-btn').forEach(b => b.classList.remove('on'));
  el.classList.add('on');
  render();
}

function setPeriod(p, el) {
  period = p;
  document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('on'));
  el.classList.add('on');
  render();
}

// ── INIT ─────────────────────────────────────────────────────
load();
</script>
</body>
</html>
