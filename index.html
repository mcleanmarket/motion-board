<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#050505" />
  <title>MOTION // BOARD</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #050505;
      --line:    #161616;
      --line-hi: #222;
      --text:    #ededed;
      --dim:     #3a3a3a;
      --muted:   #555;
      --gold:    #c9a84c;
      --silver:  #8a8a8a;
      --bronze:  #7a4a2a;
      --green:   #3ddc84;
      --pad-x: clamp(20px, 5vw, 48px);
      --pad-y: clamp(36px, 6vw, 64px);
    }

    html { font-size: 16px; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      min-height: 100vh;
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      background-size: 200px 200px;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: var(--bg);
      opacity: 0.88;
      pointer-events: none;
      z-index: 0;
    }

    .wrap {
      position: relative;
      z-index: 1;
      max-width: 860px;
      margin: 0 auto;
      padding: var(--pad-y) var(--pad-x);
      padding-left: max(var(--pad-x), env(safe-area-inset-left));
      padding-right: max(var(--pad-x), env(safe-area-inset-right));
      padding-bottom: max(80px, env(safe-area-inset-bottom));
    }

    /* ── HEADER ─────────────────────────────────── */
    .hdr {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: clamp(40px, 6vw, 64px);
    }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(30px, 6vw, 48px);
      letter-spacing: 0.06em;
      line-height: 1;
      color: var(--text);
    }
    .logo .slash { color: var(--dim); margin: 0 6px; }
    .logo .sub {
      font-family: 'Space Mono', monospace;
      font-size: clamp(9px, 1.4vw, 12px);
      color: var(--muted);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-top: 5px;
    }

    .hdr-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 8px;
      flex-shrink: 0;
      padding-top: 2px;
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: clamp(9px, 1.2vw, 11px);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--dim);
      flex-shrink: 0;
    }
    .dot.live {
      background: var(--green);
      box-shadow: 0 0 10px var(--green);
      animation: blink 2.4s ease-in-out infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    .refresh-btn {
      font-family: 'Space Mono', monospace;
      font-size: clamp(9px, 1.2vw, 10px);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--dim);
      background: none;
      border: 1px solid var(--line-hi);
      cursor: pointer;
      padding: 6px 12px;
      border-radius: 3px;
      transition: all 0.15s;
      min-height: 36px;
      touch-action: manipulation;
    }
    .refresh-btn:hover  { color: var(--muted); border-color: var(--muted); }
    .refresh-btn:active { opacity: 0.6; }

    /* ── CONTROLS ───────────────────────────────── */
    .controls { margin-bottom: clamp(36px, 5vw, 52px); }

    .metric-wrap {
      display: inline-flex;
      margin-bottom: 18px;
      border: 1px solid var(--line-hi);
      border-radius: 4px;
      overflow: hidden;
    }

    .metric-btn {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(16px, 2.5vw, 20px);
      letter-spacing: 0.12em;
      color: var(--muted);
      background: none;
      border: none;
      border-right: 1px solid var(--line-hi);
      cursor: pointer;
      padding: 9px 28px 6px;
      transition: all 0.15s;
      min-height: 44px;
      touch-action: manipulation;
    }
    .metric-btn:last-child { border-right: none; }
    .metric-btn:hover { color: var(--silver); }
    .metric-btn.on { background: var(--text); color: var(--bg); }

    .period-outer { position: relative; }
    .period-outer::after {
      content: '';
      position: absolute;
      right: 0; top: 0; bottom: 4px;
      width: 32px;
      background: linear-gradient(90deg, transparent, var(--bg));
      pointer-events: none;
    }

    .period-wrap {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      padding-bottom: 4px;
    }
    .period-wrap::-webkit-scrollbar { display: none; }

    @media (min-width: 600px) {
      .period-wrap { flex-wrap: wrap; overflow-x: visible; }
      .period-outer::after { display: none; }
    }

    .period-btn {
      font-family: 'Space Mono', monospace;
      font-size: clamp(9px, 1.3vw, 11px);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      background: none;
      border: 1px solid var(--line);
      cursor: pointer;
      padding: 8px 14px;
      border-radius: 100px;
      transition: all 0.15s;
      white-space: nowrap;
      flex-shrink: 0;
      min-height: 36px;
      touch-action: manipulation;
    }
    .period-btn:hover  { border-color: var(--line-hi); color: var(--silver); }
    .period-btn:active { opacity: 0.6; }
    .period-btn.on     { border-color: rgba(237,237,237,0.35); color: var(--text); }

    /* ── BOARD LABEL ────────────────────────────── */
    .section-label {
      font-size: clamp(8px, 1.1vw, 10px);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--dim);
      margin-bottom: 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 0 6px;
    }
    .section-label .sep { color: var(--line-hi); }
    .section-label .date-range { color: var(--muted); }

    /* ── BOARD ──────────────────────────────────── */
    .board { display: flex; flex-direction: column; }
    .divider { height: 1px; background: var(--line); }

    .row {
      display: grid;
      grid-template-columns: clamp(36px, 6vw, 56px) 1fr clamp(52px, 8vw, 80px);
      align-items: center;
      gap: clamp(12px, 2.5vw, 20px);
      padding: clamp(16px, 2.5vw, 22px) 0;
      position: relative;
      overflow: hidden;
      animation: slideIn 0.3s ease both;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-8px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .row::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: var(--pct, 0%);
      background: linear-gradient(90deg, rgba(255,255,255,0.03) 0%, transparent 100%);
      transition: width 0.8s cubic-bezier(0.4,0,0.2,1);
      pointer-events: none;
    }

    .row.r1::after,
    .row.r2::after,
    .row.r3::after {
      content: '';
      position: absolute;
      left: 0; top: 25%; bottom: 25%;
      width: 2px;
      border-radius: 1px;
    }
    .row.r1::after { background: var(--gold); }
    .row.r2::after { background: var(--silver); }
    .row.r3::after { background: var(--bronze); }

    .row-rank {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(24px, 4vw, 36px);
      letter-spacing: 0.04em;
      color: var(--dim);
      text-align: center;
      line-height: 1;
      position: relative;
      z-index: 1;
    }
    .row.r1 .row-rank { color: var(--gold); }
    .row.r2 .row-rank { color: var(--silver); }
    .row.r3 .row-rank { color: var(--bronze); }

    .row-info { position: relative; z-index: 1; min-width: 0; }
    .row-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(18px, 3.5vw, 26px);
      letter-spacing: 0.08em;
      color: var(--text);
      line-height: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .row-count {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(32px, 6vw, 48px);
      letter-spacing: -0.01em;
      color: var(--muted);
      text-align: right;
      line-height: 1;
      position: relative;
      z-index: 1;
      font-variant-numeric: tabular-nums;
    }
    .row.r1 .row-count { color: var(--gold); }
    .row.r2 .row-count { color: var(--silver); }
    .row.r3 .row-count { color: var(--bronze); }

    /* ── STATE ──────────────────────────────────── */
    .msg {
      padding: clamp(48px, 8vw, 80px) 0;
      text-align: center;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--dim);
    }

    /* ── FOOTER ─────────────────────────────────── */
    .footer {
      margin-top: clamp(48px, 7vw, 72px);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .footer-logo {
      width: clamp(100px, 22vw, 160px);
      opacity: 0.55;
      filter: brightness(0) invert(1);
      transition: opacity 0.2s;
    }
    .footer-logo:hover { opacity: 0.75; }

    .footer-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      font-size: clamp(8px, 1.1vw, 10px);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--dim);
      flex-wrap: wrap;
      gap: 8px;
    }
  </style>
</head>
<body>
<div class="wrap">

  <div class="hdr">
    <div class="logo">
      MOTION<span class="slash">//</span>BOARD
      <div class="sub">Sales Leaderboard</div>
    </div>
    <div class="hdr-right">
      <div class="status-row">
        <div class="dot" id="dot"></div>
        <span id="statusTxt">—</span>
      </div>
      <button class="refresh-btn" onclick="load()">↻ Refresh</button>
    </div>
  </div>

  <div class="controls">
    <div class="metric-wrap">
      <button class="metric-btn on" onclick="setMetric('sales',this)">Sales</button>
      <button class="metric-btn"    onclick="setMetric('installs',this)">Installs</button>
    </div>
    <div class="period-outer">
      <div class="period-wrap">
        <button class="period-btn"    onclick="setPeriod('today',this)">Today</button>
        <button class="period-btn"    onclick="setPeriod('yesterday',this)">Yesterday</button>
        <button class="period-btn on" onclick="setPeriod('this-week',this)">This Week</button>
        <button class="period-btn"    onclick="setPeriod('last-week',this)">Last Week</button>
        <button class="period-btn"    onclick="setPeriod('this-month',this)">This Month</button>
        <button class="period-btn"    onclick="setPeriod('last-month',this)">Last Month</button>
        <button class="period-btn"    onclick="setPeriod('this-year',this)">This Year</button>
      </div>
    </div>
  </div>

  <div class="section-label" id="boardLabel"></div>
  <div class="board" id="board">
    <div class="divider"></div>
    <div class="msg">Loading...</div>
  </div>

  <div class="footer">
    <img src="./logo.png" alt="Motion Marketing" class="footer-logo" />
    <div class="footer-meta">
      <span>Motion Marketing</span>
      <span id="footerTime"></span>
    </div>
  </div>

</div>
<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwNxbZpAMujaCCV1ppqGKE-1azpK-vXembm9w_VOH5cvpoIG_yisVTjYTK7V6Um9GJFNg/exec';

let rawData = null;
let metric  = 'sales';
let period  = 'this-week';

function sub(d, n) { const x = new Date(d); x.setDate(x.getDate() - n); return x; }
function add(d, n) { const x = new Date(d); x.setDate(x.getDate() + n); return x; }

function dateRange(p) {
  const now = new Date();
  const t   = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  let s, e;
  switch (p) {
    case 'today':      s = e = t;         break;
    case 'yesterday':  s = e = sub(t,1);  break;
    case 'this-week': {
      const wd = t.getDay();
      s = sub(t, wd === 0 ? 6 : wd - 1);
      e = add(s, 6);
      break;
    }
    case 'last-week': {
      const wd  = t.getDay();
      const mon = sub(t, wd === 0 ? 6 : wd - 1);
      s = sub(mon, 7); e = sub(mon, 1);
      break;
    }
    case 'this-month':
      s = new Date(t.getFullYear(), t.getMonth(), 1);
      e = new Date(t.getFullYear(), t.getMonth() + 1, 0);
      break;
    case 'last-month':
      s = new Date(t.getFullYear(), t.getMonth() - 1, 1);
      e = new Date(t.getFullYear(), t.getMonth(), 0);
      break;
    case 'this-year':
      s = new Date(t.getFullYear(), 0, 1);
      e = new Date(t.getFullYear(), 11, 31);
      break;
  }
  return [s, e];
}

function inRange(str, s, e) {
  if (!str) return false;
  const d = new Date(str);
  if (isNaN(d)) return false;
  const day = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  return day >= s && day <= e;
}

function fmtDate(d) {
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function dateLabel(p) {
  const [s, e] = dateRange(p);
  if (s.getTime() === e.getTime()) return fmtDate(s);
  // same month
  if (s.getMonth() === e.getMonth() && s.getFullYear() === e.getFullYear()) {
    return s.toLocaleDateString('en-US', { month: 'short' }) + ' ' + s.getDate() + '–' + e.getDate();
  }
  if (p === 'this-year' || p === 'last-year') {
    return s.getFullYear().toString();
  }
  return fmtDate(s) + ' – ' + fmtDate(e);
}

const LABELS = {
  'today':'Today','yesterday':'Yesterday','this-week':'This Week',
  'last-week':'Last Week','this-month':'This Month',
  'last-month':'Last Month','this-year':'This Year'
};

function compute() {
  if (!rawData) return [];
  const [s, e] = dateRange(period);
  return Object.entries(rawData.reps)
    .map(([rep, rows]) => ({
      rep,
      count: metric === 'sales'
        ? rows.filter(r => inRange(r.sold, s, e)).length
        : rows.filter(r => r.accStatus.toLowerCase() === 'active' && inRange(r.install, s, e)).length
    }))
    .filter(r => r.count > 0)
    .sort((a, b) => b.count - a.count);
}

function render() {
  const board = document.getElementById('board');
  const label = document.getElementById('boardLabel');

  const metricLabel = metric === 'sales' ? 'Sales' : 'Installs';
  const dl = dateLabel(period);
  label.innerHTML = `
    <span>${LABELS[period]}</span>
    <span class="sep">·</span>
    <span>${metricLabel}</span>
    <span class="sep">·</span>
    <span class="date-range">${dl}</span>`;

  if (!rawData) {
    board.innerHTML = '<div class="divider"></div><div class="msg">Loading...</div>';
    return;
  }
  const rows = compute();
  if (!rows.length) {
    board.innerHTML = '<div class="divider"></div><div class="msg">No data for this period</div>';
    return;
  }
  const max = rows[0].count;
  board.innerHTML = rows.map((r, i) => {
    const rank = i + 1;
    const cls  = rank <= 3 ? ` r${rank}` : '';
    const pct  = Math.round((r.count / max) * 100);
    return `
      <div class="divider"></div>
      <div class="row${cls}" style="--pct:${pct}%;animation-delay:${i*50}ms">
        <div class="row-rank">${String(rank).padStart(2,'0')}</div>
        <div class="row-info"><div class="row-name">${r.rep}</div></div>
        <div class="row-count">${r.count}</div>
      </div>`;
  }).join('') + '<div class="divider"></div>';
}

async function load() {
  const dot = document.getElementById('dot');
  const txt = document.getElementById('statusTxt');
  dot.className = 'dot';
  txt.textContent = 'Loading...';
  render();
  try {
    const res  = await fetch(GAS_URL + '?cb=' + Date.now());
    const json = await res.json();
    if (!json.ok) throw new Error(json.error || 'Error');
    rawData = json;
    dot.className = 'dot live';
    txt.textContent = 'Live';
    document.getElementById('footerTime').textContent =
      'Updated ' + new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
    render();
  } catch (err) {
    dot.className = 'dot';
    txt.textContent = 'Error';
    document.getElementById('board').innerHTML =
      '<div class="divider"></div><div class="msg">Could not load — check GAS URL</div>';
    console.error(err);
  }
}

function setMetric(m, el) {
  metric = m;
  document.querySelectorAll('.metric-btn').forEach(b => b.classList.remove('on'));
  el.classList.add('on');
  render();
}

function setPeriod(p, el) {
  period = p;
  document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('on'));
  el.classList.add('on');
  render();
}

load();
</script>
</body>
</html>
